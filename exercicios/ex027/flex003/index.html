<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexiblebox</title>
    <style>
        div.container{
            background-color: red;
            display: flex;
            flex-flow: column wrap;
            height: 100px;
        }

        div.item{
            background-color: rgb(18, 151, 228);
            border: 1px solid black;
            text-align: center;
            flex: auto;
            
        }
    </style>
</head>
    <body>
        <div class="container">
            <div class="item">exempo de blobo A</div>
            <div class="item">exempo de blobo b</div>
            <div class="item">exempo de blobo c</div>
            <div class="item">exempo de blobo d</div>
            <div class="item">exempo de blobo e</div>
            <div class="item">exempo de blobo f</div>
            <div class="item">exempo de blobo g</div>

        </div>
    </body>
</html>
