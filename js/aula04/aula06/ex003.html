<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro programa</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>


        <style>
                body{
                             background: linear-gradient(to right, red, blue);
                    }

                h1, p {
                            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
                            -webkit-background-clip: text;
                            background-clip: text;
                            color: transparent;
                            animation: moverGradiente 5s linear infinite;
                            background-size: 400% 400%;
                        }

                @keyframes 
                moverGradiente {
                            0% { background-position: 0% 50%; }
                            100% { background-position: 100% 50%; }
                        }
        </style>
    
</head>
        <body>
                <h1>Olá mundo</h1>
                <p>Livre de maldições :D</p>
        </body>

        <script>  

           var n1 = Number.parsefloat(window.prompt('Digite um número: ')) //string
           var n2 = Number.parsefloat(window.prompt('Digite outro número: ')) //string
           var s = n1 + n2
           window.alert('A soma dos valores é ' + s) // concatenação
           // (number + number) para adição
           // (string + string) para concatenação


           // parei em 23:40

        </script>

        
</html>
